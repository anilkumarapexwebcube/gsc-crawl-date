<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC Crawl Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #DCDCDC;
    --surface: #F5F5F5;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00ccff;
    --danger: #ff4466;
    --text: black;
    --muted: #555570;
    --card: #16161f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .header .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .header h1 {
    font-size: 42px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  /* Input group */
  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .domain-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .domain-input::placeholder { color: var(--muted); }

  .domain-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }

  .run-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .run-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,255,136,0.3);
  }

  .run-btn:active:not(:disabled) { transform: translateY(0); }

  .run-btn:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Status area */
  .status-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.3s;
  }

  .status-box.running { border-color: var(--accent2); }
  .status-box.success { border-color: var(--accent); }
  .status-box.error { border-color: var(--danger); }

  .status-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .status-icon.idle { background: rgba(85,85,112,0.3); }
  .status-icon.running { background: rgba(0,204,255,0.15); animation: pulse 1.5s infinite; }
  .status-icon.success { background: rgba(0,255,136,0.15); }
  .status-icon.error { background: rgba(255,68,102,0.15); }

  .status-text { flex: 1; }

  .status-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .status-title.running { color: var(--accent2); }
  .status-title.success { color: var(--accent); }
  .status-title.error { color: var(--danger); }
  .status-title.idle { color: var(--muted); }

  .status-sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Progress dots */
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  /* History */
  .history-section {
    margin-top: 28px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .history-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 240px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    animation: fadeUp 0.3s ease both;
  }

  .history-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .history-dot.success { background: var(--accent); }
  .history-dot.error { background: var(--danger); }

  .history-domain {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .history-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .history-status {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
  }

  .history-status.success {
    background: rgba(0,255,136,0.1);
    color: var(--accent);
  }

  .history-status.error {
    background: rgba(255,68,102,0.1);
    color: var(--danger);
  }

  .empty-history {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  /* Footer */
  .footer {
    margin-top: 32px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .footer span { color: var(--accent); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,204,255,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(0,204,255,0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="badge">GSC Automation Tool</div>
    <h1>Crawl Date<br><span>Tracker</span></h1>
    <p>Input domain → n8n workflow run → Google Sheet update</p>
  </div>

  <!-- Main Card -->
  <div class="card">
    <label class="input-label">Domain Name</label>
    <div class="input-row">
      <input
        type="text"
        class="domain-input"
        id="domainInput"
        placeholder="removalistauction.com.au"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="run-btn" id="runBtn" onclick="runWorkflow()">
        ▶ Run
      </button>
    </div>

    <!-- Status -->
    <div class="status-box" id="statusBox">
      <div class="status-icon idle" id="statusIcon">⬡</div>
      <div class="status-text">
        <div class="status-title idle" id="statusTitle">Ready</div>
        <div class="status-sub" id="statusSub">Domain enter karo aur Run click karo</div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <span class="history-title">Run History</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history" id="emptyMsg">— Abhi koi run nahi hua —</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Connected to <span>n8n</span> · Webhook Active
  </div>

</div>

<script>
  const WEBHOOK_URL = 'https://anilkumar-automation.app.n8n.cloud/webhook/gsc-crawl';
  let history = JSON.parse(localStorage.getItem('gsc_history') || '[]');

  // Enter key support
  document.getElementById('domainInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runWorkflow();
  });

  // Render history on load
  renderHistory();

  async function runWorkflow() {
    const domain = document.getElementById('domainInput').value.trim();

    if (!domain) {
      setStatus('error', '⚠ Domain required', 'Pehle domain name enter karo');
      return;
    }

    // Set running state
    setStatus('running', 'Running...', `Processing: ${domain}`);
    document.getElementById('runBtn').disabled = true;
    document.getElementById('domainInput').disabled = true;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ domain: domain })
      });

      if (response.ok) {
        setStatus('success', '✓ Workflow Started!', `n8n processing: ${domain} — Sheet update ho rahi hai`);
        addHistory(domain, 'success');
      } else {
        throw new Error(`HTTP ${response.status}`);
      }

    } catch (err) {
      setStatus('error', '✕ Failed', `Error: ${err.message} — n8n connection check karo`);
      addHistory(domain, 'error');
    } finally {
      document.getElementById('runBtn').disabled = false;
      document.getElementById('domainInput').disabled = false;
    }
  }

  function setStatus(type, title, sub) {
    const box = document.getElementById('statusBox');
    const icon = document.getElementById('statusIcon');
    const titleEl = document.getElementById('statusTitle');
    const subEl = document.getElementById('statusSub');

    box.className = `status-box ${type}`;
    icon.className = `status-icon ${type}`;
    titleEl.className = `status-title ${type}`;

    const icons = { idle: '⬡', running: '', success: '✓', error: '✕' };
    const dots = type === 'running'
      ? '<div class="dots"><span></span><span></span><span></span></div>'
      : icons[type];

    icon.innerHTML = dots;
    titleEl.textContent = title;
    subEl.textContent = sub;
  }

  function addHistory(domain, status) {
    const now = new Date();
    const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });

    history.unshift({ domain, status, time, date });
    if (history.length > 20) history.pop();
    localStorage.setItem('gsc_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('emptyMsg');

    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history" id="emptyMsg">— Abhi koi run nahi hua —</div>';
      return;
    }

    list.innerHTML = history.map(item => `
      <div class="history-item">
        <div class="history-dot ${item.status}"></div>
        <div class="history-domain">${item.domain}</div>
        <div class="history-time">${item.date} ${item.time}</div>
        <div class="history-status ${item.status}">${item.status === 'success' ? 'Sent' : 'Failed'}</div>
      </div>
    `).join('');
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('gsc_history');
    renderHistory();
  }
</script>
</body>
</html>
